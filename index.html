<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>安恒序 · 个人工作计划</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.hd{background:linear-gradient(135deg,#1a1d28,#252a3a);border-bottom:1px solid #2a2e3f;padding:14px 16px;position:sticky;top:0;z-index:100}
.hd h1{font-size:17px;font-weight:700;background:linear-gradient(135deg,#6c8cff,#a55eea);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hd .sub{font-size:11px;color:#9ca3b8;margin-top:2px}
.hd-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;align-items:center}
.dbadge{display:inline-block;background:rgba(108,140,255,.15);color:#6c8cff;padding:4px 10px;border-radius:10px;font-size:11px;font-weight:600}
.refresh-btn{display:inline-flex;align-items:center;gap:4px;background:rgba(46,213,115,.13);color:#2ed573;border:1px solid rgba(46,213,115,.28);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer}
.refresh-btn:active{background:rgba(46,213,115,.25)}
.sync-export-btn{display:inline-flex;align-items:center;gap:4px;background:rgba(255,159,67,.15);color:#ff9f43;border:1px solid rgba(255,159,67,.3);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer}
.sync-export-btn:active{background:rgba(255,159,67,.25)}
.sync-export-btn.has-changes{background:rgba(255,77,106,.18);color:#ff4d6a;border-color:rgba(255,77,106,.3);animation:pulse 2s infinite}
.sync-clear-btn{display:inline-flex;align-items:center;gap:4px;background:rgba(120,120,140,.12);color:#9ca3b8;border:1px solid rgba(120,120,140,.2);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer}
.sync-clear-btn:active{background:rgba(120,120,140,.25)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,77,106,.4)}50%{box-shadow:0 0 0 6px rgba(255,77,106,0)}}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px 16px}
.sc{background:#1a1d28;border-radius:10px;padding:10px;border:1px solid #2a2e3f;text-align:center}
.sc .n{font-size:22px;font-weight:800}
.sc .l{font-size:9px;color:#9ca3b8;margin-top:2px;letter-spacing:1px}
.tabs{display:flex;border-bottom:1px solid #2a2e3f;padding:0 16px}
.tab{padding:12px 18px;font-size:14px;font-weight:600;color:#9ca3b8;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;-webkit-tap-highlight-color:rgba(108,140,255,.2)}
.tab.on{color:#6c8cff;border-bottom-color:#6c8cff}
.vw{display:none;padding:10px 16px 40px}
.vw.on{display:block}
.fbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.fb{padding:5px 12px;border-radius:14px;font-size:11px;font-weight:600;background:#1a1d28;border:1px solid #2a2e3f;color:#9ca3b8;cursor:pointer;-webkit-tap-highlight-color:rgba(108,140,255,.2)}
.fb.on{background:rgba(108,140,255,.2);border-color:#6c8cff;color:#6c8cff}
.kb{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kc{background:rgba(26,29,40,.7);border-radius:10px;padding:10px;min-height:120px}
.kc h3{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #2a2e3f}
.kc.td h3{color:#ff9f43;border-color:#ff9f43}
.kc.wt h3{color:#778ca3;border-color:#778ca3}
.kc.dn h3{color:#2ed573;border-color:#2ed573}
.tc{background:#1a1d28;border-radius:8px;padding:11px;margin-bottom:7px;border:1px solid #2a2e3f;cursor:pointer;position:relative;transition:background .15s}
.tc:active{background:#252838}
.tc.done{opacity:.55}
.tc.done .tt{text-decoration:line-through;color:#778ca3}
.tc.local-mod{border-color:rgba(255,159,67,.5);box-shadow:inset 0 0 0 1px rgba(255,159,67,.15)}
.tc-toggle{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;border:2px solid #3a3f55;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:5;font-size:14px;color:transparent;padding:0;line-height:1}
.tc-toggle:hover,.tc-toggle:active{transform:scale(1.12);border-color:#2ed573}
.tc-toggle.checked{background:#2ed573;border-color:#2ed573;color:#0f1117;font-weight:700}
.tc-toggle.checked:hover,.tc-toggle.checked:active{background:#ff4d6a;border-color:#ff4d6a;color:#fff}
.tc.done .tc-toggle.checked{background:rgba(46,213,115,.5);border-color:rgba(46,213,115,.5)}
.tt{font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.35;padding-right:34px}
.td2{font-size:10.5px;color:#9ca3b8;line-height:1.4;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;word-break:break-word}
.td2.trunc{max-height:2.8em;position:relative}
.td2.trunc::after{content:'';position:absolute;bottom:0;right:0;width:50px;height:1.2em;background:linear-gradient(to right,transparent,#1a1d28)}
.tc:hover .td2.trunc::after{background:linear-gradient(to right,transparent,#252838)}
.tc:hover .td2.trunc{-webkit-line-clamp:unset;max-height:none}
.td2 .ds-bullet{display:block;padding-left:12px;position:relative;margin-top:1px}
.td2 .ds-bullet::before{content:'•';position:absolute;left:0;color:#6c8cff}
.mg{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.bg{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9.5px;font-weight:600}
.bu{background:rgba(255,77,106,.18);color:#ff4d6a}
.bh{background:rgba(255,159,67,.18);color:#ff9f43}
.bm{background:rgba(255,217,61,.18);color:#ffd93d}
.bl{background:rgba(46,213,115,.18);color:#2ed573}
.bc{background:rgba(108,140,255,.13);color:#6c8cff}
.bp{background:rgba(236,100,166,.18);color:#ec64a6}
.bd{background:rgba(255,255,255,.06);color:#9ca3b8}
.blocal{background:rgba(255,159,67,.2);color:#ff9f43;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:2px}
.pb{width:100%;height:4px;background:#2a2e3f;border-radius:2px;margin-top:6px;overflow:hidden}
.pb .pf{height:100%;border-radius:2px;transition:width .3s}
/* Gantt */
.gantt-wrap{overflow-x:auto;overflow-y:auto;max-height:70vh;margin-top:8px}
.gantt-wrap table{border-collapse:collapse;min-width:800px;width:max-content}
.gantt-wrap th,.gantt-wrap td{padding:5px 4px;font-size:10.5px;border:1px solid #1f2333}
.gantt-wrap th{background:#1a1d28;color:#9ca3b8;font-weight:600;position:sticky;top:0;z-index:5}
.gantt-wrap .g-today{background:rgba(255,77,106,.15)!important;color:#ff4d6a}
.gantt-wrap .g-today::after{content:'▼';font-size:8px;margin-left:2px}
.gantt-bar{border-radius:3px;height:18px;min-width:3px;display:inline-block;position:relative}
.gantt-bar.g-done{background:rgba(46,213,115,.6)}
.gantt-bar.g-progress{background:rgba(255,159,67,.6)}
.gantt-bar.g-wait{background:rgba(120,140,160,.35)}
.gantt-bar.g-urgent{background:rgba(255,77,106,.6)}
.gantt-task-name{max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10.5px;color:#e8eaf0;font-weight:600}
.gantt-task-name.done{text-decoration:line-through;color:#778ca3}
/* Weekly Summary */
.ws-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:8px}
.ws-card{background:#1a1d28;border-radius:10px;padding:14px;border:1px solid #2a2e3f}
.ws-card h3{font-size:12px;font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #2a2e3f;display:flex;align-items:center;gap:6px}
.ws-card .ws-icon{font-size:16px}
.ws-card.done h3{color:#2ed573;border-color:#2ed573}
.ws-card.todo h3{color:#ff9f43;border-color:#ff9f43}
.ws-card.wait h3{color:#778ca3;border-color:#778ca3}
.ws-card.urgent h3{color:#ff4d6a;border-color:#ff4d6a}
.ws-item{font-size:11px;color:#c4c9d4;padding:5px 0;border-bottom:1px solid #232738;display:flex;align-items:center;gap:6px}
.ws-item:last-child{border-bottom:none}
.ws-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ws-num{font-size:28px;font-weight:800;float:right}
.ws-stat-group{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.ws-stat{background:#0f1117;border-radius:8px;padding:10px;text-align:center}
.ws-stat .num{font-size:20px;font-weight:800}
.ws-stat .lab{font-size:9px;color:#9ca3b8;margin-top:2px}
/* Calendar */
.cal-header{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
.cal-header button{background:#1a1d28;border:1px solid #2a2e3f;color:#9ca3b8;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer}
.cal-header .cal-month{font-size:15px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center}
.cal-dow{padding:6px 0;font-size:10px;font-weight:700;color:#9ca3b8}
.cal-day{background:#1a1d28;border-radius:8px;padding:4px 2px;min-height:56px;cursor:pointer;border:1px solid #2a2e3f;font-size:11px;transition:background .15s;position:relative}
.cal-day:hover{background:#252a3a}
.cal-day.today{border-color:#ff4d6a;background:rgba(255,77,106,.08)}
.cal-day.today .cal-dnum{color:#ff4d6a;font-weight:800}
.cal-day.other{opacity:.35}
.cal-dnum{font-size:11px;font-weight:600;margin-bottom:3px}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center}
.cal-dot{width:6px;height:6px;border-radius:50%}
.cal-dot.done-bg{background:#2ed573}
.cal-dot.todo-bg{background:#ff9f43}
.cal-dot.wait-bg{background:#778ca3}
.cal-day-pop{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1d28;border:1px solid #2a2e3f;border-radius:8px;padding:6px 8px;z-index:50;min-width:150px;max-width:220px;font-size:10px;text-align:left;box-shadow:0 4px 16px rgba(0,0,0,.5);white-space:nowrap;pointer-events:none}
.cal-day:hover .cal-day-pop{display:block}
.cal-day-pop .cp-item{padding:3px 0;border-bottom:1px solid #232738;display:flex;gap:4px;align-items:center}
.cal-day-pop .cp-item:last-child{border-bottom:none}
.cal-day-pop .cp-status{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:600}
.cal-day-pop .cp-status.done-c{color:#2ed573;background:rgba(46,213,115,.15)}
.cal-day-pop .cp-status.todo-c{color:#ff9f43;background:rgba(255,159,67,.15)}
.cal-day-pop .cp-status.wait-c{color:#778ca3;background:rgba(120,140,160,.15)}
.tl{position:relative;padding-left:24px}
.tl::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2.5px;background:#2a2e3f;border-radius:2px}
.tg{margin-bottom:18px}
.tldate{font-size:13px;font-weight:700;margin-bottom:8px;position:relative}
.tldate::before{content:'';position:absolute;left:-19px;top:50%;width:10px;height:10px;border-radius:50%;background:#6c8cff;transform:translateY(-50%);border:3px solid #0f1117}
.tldate.today::before{background:#ff4d6a;box-shadow:0 0 8px rgba(255,77,106,.5)}
.tldate.today{color:#ff4d6a}
.tldate.past::before{background:#2ed573}
.tldate.past{color:#2ed573}
.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center;padding:16px}
.mo.show{display:flex}
.md{background:#1a1d28;border-radius:14px;padding:20px;max-width:440px;width:100%;border:1px solid #2a2e3f;max-height:85vh;overflow-y:auto}
.md h2{font-size:17px;margin-bottom:12px;line-height:1.4}
.fl{margin-bottom:14px}
.fl label{display:block;font-size:10px;color:#9ca3b8;margin-bottom:4px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.fl .vl{font-size:14px;line-height:1.55}
.empty{color:#5a6078;font-size:12px;text-align:center;padding:24px 12px}
.ft{text-align:center;padding:16px;color:#5a6078;font-size:10.5px;border-top:1px solid #2a2e3f;margin-top:16px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:#1a1d28;color:#e8eaf0;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:300;opacity:0;transition:all .3s;white-space:nowrap;border:1px solid #2a2e3f}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.sync-badge{font-size:10px;color:#778ca3;margin-top:4px}
.sync-badge.ok{color:#2ed573}
.sync-badge.err{color:#ff4d6a}
.search-wrap{display:flex;align-items:center;gap:6px;background:#1a1d28;border:1px solid #2a2e3f;border-radius:8px;padding:2px 10px;flex:1;min-width:120px;max-width:280px;transition:border-color .2s}
.search-wrap:focus-within{border-color:#6c8cff}
.search-wrap .sicon{color:#5a6078;font-size:14px;pointer-events:none}
.search-wrap input{background:transparent;border:none;color:#e8eaf0;font-size:13px;padding:6px 0;outline:none;width:100%;font-family:inherit}
.search-wrap input::placeholder{color:#5a6078}
.search-clear{display:none;background:none;border:none;color:#5a6078;cursor:pointer;font-size:14px;padding:2px 2px}
.search-clear.show{display:block}
.search-empty{color:#5a6078;font-size:13px;text-align:center;padding:32px 12px}
.notif-badge{position:relative;display:inline-flex;align-items:center;gap:4px;background:rgba(108,140,255,.12);color:#6c8cff;border:1px solid rgba(108,140,255,.25);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer}
.notif-badge.enabled{background:rgba(46,213,115,.13);color:#2ed573;border-color:rgba(46,213,115,.28)}
.notif-badge:active{transform:scale(.95)}
.chart-wrap{background:#1a1d28;border-radius:10px;padding:14px;border:1px solid #2a2e3f;margin-bottom:10px;position:relative;min-height:200px}
.chart-wrap h3{font-size:12px;font-weight:700;margin-bottom:10px;color:#6c8cff}
.loading{text-align:center;padding:60px 20px;color:#9ca3b8;font-size:14px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #2a2e3f;border-top-color:#6c8cff;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr)}.kb{grid-template-columns:1fr}.hd h1{font-size:15px}.md{padding:16px}.kc{min-height:80px}}
</style>
</head>
<body>

<div class="hd">
  <div style="display:flex;justify-content:space-between;align-items:start">
    <div>
      <h1>安恒序 &middot; 个人工作计划</h1>
      <div class="sub">中海油能源发展 &middot; 钻采工程研究院 &middot; 储层改造研究所</div>
      <div class="sync-badge" id="syncStatus">加载中...</div>
    </div>
  </div>
  <div class="hd-badges">
    <span class="dbadge" id="todayBadge"></span>
    <div class="search-wrap">
      <span class="sicon">&#128270;</span>
      <input type="text" id="searchInput" placeholder="搜索任务..." oninput="onSearch(this.value)" autocomplete="off">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">&#10005;</button>
    </div>
    <span class="refresh-btn" onclick="refreshData()">&#8635; 刷新 <span id="refreshTimer" style="font-size:9px;color:#5a6078;font-weight:400"></span></span>
    <span class="sync-export-btn" id="syncBtn" onclick="exportChanges()" title="导出本地修改，粘贴给Claw同步">&#128206; 同步变更 <span id="syncCount"></span></span>
    <span class="sync-clear-btn" id="clearBtn" onclick="clearLocalChanges()" style="display:none">&#10005; 清除本地</span>
    <span class="notif-badge" id="notifBtn" onclick="requestNotify()">&#128276; 通知</span>
    <span class="refresh-btn" onclick="exportCSV()" title="导出任务为CSV文件">&#128229; 导出CSV</span>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="tabs" id="tabsBar">
  <div class="tab on" onclick="switchTab('kanban',this)">看板</div>
  <div class="tab" onclick="switchTab('timeline',this)">时间线</div>
  <div class="tab" onclick="switchTab('gantt',this)">甘特图</div>
  <div class="tab" onclick="switchTab('weekly',this)">周总结</div>
  <div class="tab" onclick="switchTab('calendar',this)">日历</div>
  <div class="tab" onclick="switchTab('all',this)">全部任务</div>
  <div class="tab" onclick="switchTab('done',this)">&#10003; 已完成</div>
</div>

<div id="loadingArea" style="padding:40px 16px;text-align:center">
  <div class="spinner"></div>
  <div style="color:#9ca3b8;font-size:13px">正在加载数据...</div>
</div>

<div class="vw" id="v-kanban" style="display:none">
  <div class="fbar" id="fk"></div>
  <div class="kb">
    <div class="kc td"><h3>待办</h3><div id="kb-todo"></div></div>
    <div class="kc wt"><h3>等待中</h3><div id="kb-wait"></div></div>
    <div class="kc dn" id="kb-done-col" style="cursor:pointer" onclick="document.querySelector('.tab:last-child').click()"><h3>已完成</h3><div id="kb-done-summary"></div></div>
  </div>
</div>

<div class="vw" id="v-timeline" style="display:none">
  <div class="fbar" id="ft"></div>
  <div class="tl" id="tlbox"></div>
</div>

<div class="vw" id="v-all" style="display:none">
  <div class="fbar" id="fa"></div>
  <div id="allbox"></div>
</div>

<div class="vw" id="v-gantt" style="display:none">
  <div class="fbar" id="fg"></div>
  <div id="ganttBox" style="padding:0 4px"></div>
</div>

<div class="vw" id="v-weekly" style="display:none">
  <div id="weeklyBox" style="padding:0 4px"></div>
</div>

<div class="vw" id="v-calendar" style="display:none">
  <div id="calBox" style="padding:0 4px"></div>
</div>

<div class="vw" id="v-done" style="display:none">
  <div class="fbar" id="fd"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div style="font-size:12px;color:#9ca3b8" id="doneStats"></div>
    <div style="display:flex;gap:6px">
      <span class="fb on" id="doneSortDate" onclick="sortDone('date')" style="font-size:10px">按日期 &#9660;</span>
      <span class="fb" id="doneSortCat" onclick="sortDone('cat')" style="font-size:10px">按类别</span>
    </div>
  </div>
  <div id="donebox"></div>
</div>

<div class="mo" id="detailMo" onclick="if(event.target===this)closeMo()"><div class="md" id="detailMd" onclick="event.stopPropagation()"></div></div>
<div class="toast" id="toast"></div>

<div class="ft">
  手动完成任务后点击「同步变更」按钮 → 粘贴给 Claw 即可同步到记忆<br>
  <span id="updateTime"></span> <span id="dataAge" style="font-size:10px;color:#5a6078"></span>
</div>

<script>
// ===== GLOBALS =====
var TASKS = [];
var filterCat = "全部";
var searchQuery = "";
var TODAY = "";
var DATA_VERSION = "";

// Set today's date
(function(){
  var now = new Date();
  var y = now.getFullYear();
  var m = String(now.getMonth()+1).padStart(2,'0');
  var d = String(now.getDate()).padStart(2,'0');
  TODAY = y+"-"+m+"-"+d;
  var days = ["周日","周一","周二","周三","周四","周五","周六"];
  document.getElementById("todayBadge").textContent = TODAY + " " + days[now.getDay()];
})();

// ===== LOCAL STORAGE CHANGE TRACKING =====
var LS_KEY = "dashboard_changes_v2";

function loadLocalChanges() {
  try {
    var raw = localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveLocalChanges(changes) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(changes)); } catch(e) {}
}

function getMergedTasks() {
  var base = TASKS;
  var changes = loadLocalChanges();
  var merged = [];
  for (var i = 0; i < base.length; i++) {
    var task = {id:base[i].id, t:base[i].t, c:base[i].c, p:base[i].p, s:base[i].s, d:base[i].d, ds:base[i].ds, pg:base[i].pg};
    var cid = String(task.id);
    if (changes[cid]) {
      var ch = changes[cid];
      if (ch.s) task.s = ch.s;
      if (ch.pg !== undefined) task.pg = ch.pg;
      task._local = true;
    }
    merged.push(task);
  }
  return merged;
}

function getUnsyncedCount() {
  return Object.keys(loadLocalChanges()).length;
}

function updateSyncUI() {
  var count = getUnsyncedCount();
  var btn = document.getElementById("syncBtn");
  var cntEl = document.getElementById("syncCount");
  var clrBtn = document.getElementById("clearBtn");

  if (count > 0) {
    cntEl.textContent = "(" + count + ")";
    btn.classList.add("has-changes");
    clrBtn.style.display = "inline-flex";
  } else {
    cntEl.textContent = "";
    btn.classList.remove("has-changes");
    clrBtn.style.display = "none";
  }
}

function toggleComplete(taskId) {
  var changes = loadLocalChanges();
  var cid = String(taskId);
  var task = null;
  for (var i = 0; i < TASKS.length; i++) {
    if (TASKS[i].id === taskId) { task = TASKS[i]; break; }
  }
  if (!task) return;

  // Check current effective state (including any existing local changes)
  var curTask = getMergedTasks().find(function(t){ return t.id === taskId; });
  if (!curTask) return;

  if (curTask.s === "已完成") {
    // Revert to "待办"
    changes[cid] = { s: "待办", pg: 0 };
    showToast("已恢复为待办: " + task.t.substring(0,14)+"...");
  } else {
    // Mark as completed
    changes[cid] = { s: "已完成", pg: 100 };
    showToast("已完成: " + task.t.substring(0,14)+"...");
  }

  saveLocalChanges(changes);
  updateSyncUI();
  doRender();
}

function exportChanges() {
  var changes = loadLocalChanges();
  var count = Object.keys(changes).length;
  if (count === 0) {
    showToast("没有待同步的变更");
    return;
  }

  // Build a human-readable summary + machine-readable JSON
  var merged = getMergedTasks();
  var summary = [];
  var ids = Object.keys(changes);
  for (var i = 0; i < ids.length; i++) {
    var t = null;
    for (var j = 0; j < merged.length; j++) {
      if (String(merged[j].id) === ids[i]) { t = merged[j]; break; }
    }
    if (t) summary.push("- " + t.t + " → " + t.s);
  }

  var exportText = "请同步以下任务变更:\n" + summary.join("\n") + "\n\n---JSON---\n" + JSON.stringify(changes, null, 2);

  // Try clipboard API
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(exportText).then(function() {
      showToast("已复制 " + count + " 条变更到剪贴板，粘贴给Claw即可同步!");
    }).catch(function() {
      promptCopy(exportText, count);
    });
  } else {
    promptCopy(exportText, count);
  }
}

function promptCopy(text, count) {
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand("copy");
    showToast("已复制 " + count + " 条变更，粘贴给Claw即可同步!");
  } catch(e) {
    showToast("复制失败，请手动选择下方文本:");
    alert(text);
  }
  document.body.removeChild(ta);
}

function clearLocalChanges() {
  if (confirm("确定清除所有本地未同步的变更吗？这将恢复到服务器数据状态。")) {
    saveLocalChanges({});
    updateSyncUI();

}

// ===== CSV EXPORT =====
function exportCSV() {
  var data = getMergedTasks();
  if (data.length === 0) { showToast("没有可导出的数据"); return; }

  // BOM for Excel Chinese support
  var bom = "\uFEFF";
  var rows = [["ID","任务","类别","优先级","状态","截止日期","进度","描述"]];
  for (var i = 0; i < data.length; i++) {
    var t = data[i];
    rows.push([t.id, t.t, t.c, t.p, t.s, t.d || "", t.pg + "%", (t.ds || "").replace(/"/g,"'")]);
  }

  var csv = bom;
  for (var i = 0; i < rows.length; i++) {
    var vals = [];
    for (var j = 0; j < rows[i].length; j++) {
      var v = String(rows[i][j]);
      if (v.indexOf(",") !== -1 || v.indexOf('"') !== -1 || v.indexOf("\n") !== -1) {
        v = '"' + v.replace(/"/g,'""') + '"';
      }
      vals.push(v);
    }
    csv += vals.join(",") + "\n";
  }

  var blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "工作计划_" + TODAY + ".csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("已导出 " + data.length + " 条任务");
}

// ===== COMPLETION TREND CHART =====
var trendChart = null;

function renderTrendChart(data) {
  // Count completed tasks per day (last 14 days)
  var dayMap = {};
  var today = new Date();
  for (var i = 14; i >= 0; i--) {
    var d = new Date(today);
    d.setDate(d.getDate() - i);
    var key = formatDate(d);
    dayMap[key] = 0;
  }

  // We don't have exact completion dates, so use the task's "d" field as a proxy
  for (var i = 0; i < data.length; i++) {
    if (data[i].s === "已完成" && data[i].d && dayMap[data[i].d] !== undefined) {
      dayMap[data[i].d]++;
    }
  }

  var labels = Object.keys(dayMap);
  var values = [];
  for (var li = 0; li < labels.length; li++) {
    values.push(dayMap[labels[li]]);
  }

  // Short labels (MM/DD)
  var shortLabels = labels.map(function(d){ return d.substring(5); });

  var chartBox = document.getElementById("trendChartBox");
  if (!chartBox) return;

  chartBox.innerHTML = '<canvas id="trendChartCanvas" role="img" aria-label="近14天任务完成趋势"></canvas>';

  // Load Chart.js if not loaded
  if (typeof Chart === "undefined") {
    var script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js";
    script.onload = function() { buildChart(shortLabels, values); };
    document.head.appendChild(script);
  } else {
    buildChart(shortLabels, values);
  }
}

function buildChart(labels, values) {
  if (trendChart) trendChart.destroy();

  var canvas = document.getElementById("trendChartCanvas");
  if (!canvas) return;

  var ctx = canvas.getContext("2d");
  if (!ctx) return;

  trendChart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "完成数量",
        data: values,
        backgroundColor: "rgba(108,140,255,.45)",
        borderColor: "#6c8cff",
        borderWidth: 1.5,
        borderRadius: 4,

      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: {
          beginAtZero: true,
          ticks: {
            stepSize: 1,
            color: "#9ca3b8",
            font: { size: 10 }
          },
          grid: { color: "rgba(255,255,255,.06)" }
        },
        x: {
          ticks: {
            color: "#9ca3b8",

          },
          grid: { display: false }
        }

// ===== TASK DURATION STATS =====
function calcDurationStats(data) {
  var doneTasks = [];
  for (var i = 0; i < data.length; i++) {
    if (data[i].s === "已完成" && data[i].d) {
      doneTasks.push(data[i]);
    }
  }

  if (doneTasks.length === 0) return null;

  // Estimate duration: from id-based sequence (used id as creation order proxy)
  // We'll categorize by category
  var catCount = {}, catDone = {}, urgentDone = 0, urgentTotal = 0;
  var thisWeekDone = 0;

  var now = new Date();
  var dayOfWeek = now.getDay();
  var monday = new Date(now);
  monday.setDate(now.getDate() - dayOfWeek + 1);
  var sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  var ws = formatDate(monday);
  var we = formatDate(sunday);

  for (var i = 0; i < data.length; i++) {
    var t = data[i];
    var cat = t.c;
    if (!catCount[cat]) { catCount[cat] = 0; catDone[cat] = 0; }
    catCount[cat]++;
    if (t.s === "已完成") catDone[cat]++;
    if (t.s === "已完成" && t.d && t.d >= ws && t.d <= we) thisWeekDone++;
    if (t.p === "紧急") { urgentTotal++; if (t.s === "已完成") urgentDone++; }
  }

  var doneRate = data.length > 0 ? Math.round(doneTasks.length / data.length * 100) : 0;

  return {
    total: data.length,
    done: doneTasks.length,
    rate: doneRate,
    thisWeekDone: thisWeekDone,
    catCount: catCount,
    catDone: catDone,
    urgentDone: urgentDone,
    urgentTotal: urgentTotal
  };
}

// Priority helpers
var pCls = {"紧急":"bu","高":"bh","中":"bm","低":"bl"};
var pOrd = {"紧急":0,"高":1,"中":2,"低":3};

// ===== FETCH DATA =====
// Weekly summaries data
var weeklySummaries = null;

function fetchData(callback) {
  var url = "data.json?t=" + Date.now();
  var xhr = new XMLHttpRequest();
  xhr.open("GET", url, true);
  xhr.timeout = 10000;
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        TASKS = JSON.parse(xhr.responseText);
        DATA_VERSION = new Date().toLocaleString("zh-CN");
        lastFetchTime = Date.now();
        document.getElementById("syncStatus").textContent = "数据已加载: " + DATA_VERSION;
        document.getElementById("syncStatus").className = "sync-badge ok";
        document.getElementById("updateTime").textContent = "数据版本: " + DATA_VERSION;
        // Load weekly summaries
        loadWeeklySummaries(function() {
          hideLoading();
          if (callback) callback();
        });
      } catch(e) {
        document.getElementById("syncStatus").textContent = "数据解析失败";
        document.getElementById("syncStatus").className = "sync-badge err";
        hideLoading();
      }
    } else {
      document.getElementById("syncStatus").textContent = "加载失败 (" + xhr.status + ")";
      document.getElementById("syncStatus").className = "sync-badge err";
      hideLoading();
    }
  };
  xhr.onerror = function() {
    document.getElementById("syncStatus").textContent = "网络错误，请刷新重试";
    document.getElementById("syncStatus").className = "sync-badge err";
    hideLoading();
  };
  xhr.ontimeout = function() {
    document.getElementById("syncStatus").textContent = "请求超时，请刷新重试";
    document.getElementById("syncStatus").className = "sync-badge err";
    hideLoading();
  };
  xhr.send();
}

function loadWeeklySummaries(callback) {
  var sUrl = "weekly-summaries.json?t=" + Date.now();
  var sxhr = new XMLHttpRequest();
  sxhr.open("GET", sUrl, true);
  sxhr.timeout = 5000;
  sxhr.onload = function() {
    if (sxhr.status === 200) {
      try { weeklySummaries = JSON.parse(sxhr.responseText); } catch(e) { weeklySummaries = {}; }
    } else {
      weeklySummaries = {};
    }
    if (callback) callback();
  };
  sxhr.onerror = function() {
    weeklySummaries = {};
    if (callback) callback();
  };
  sxhr.ontimeout = function() {
    weeklySummaries = {};
    if (callback) callback();
  };
  sxhr.send();
}

// Progress color
function pgColor(p) {
  if (p >= 100) return "#2ed573";
  if (p > 0) return "#ff9f43";
  return "#5a6078";
}

// Build a single task card HTML (with completion toggle)
function makeCard(x) {
  var done = x.s === "已完成";
  var pc = pCls[x.p] || "bm";
  var cc = x.c === "私人事务" ? "bp" : "bc";
  var pg = pgColor(x.pg);
  var extraPg = (x.pg > 0 && x.pg < 100) ? '<span class="bg" style="background:rgba(255,159,67,.18);color:#ff9f43">' + x.pg + '%</span>' : '';
  var localBadge = x._local ? '<span class="blocal">本地修改</span>' : '';
  var toggleCls = done ? ' checked' : '';

  // Truncate long descriptions: show first ~55 chars on card
  var ds = x.ds || '';
  var dsHtml = ds;
  if (ds.length > 55) {
    dsHtml = '<div class="td2 trunc" title="' + ds.replace(/"/g,'&quot;') + '">' + ds + '</div>';
  } else {
    dsHtml = '<div class="td2">' + ds + '</div>';
  }

  return '<div class="tc' + (done ? ' done' : '') + (x._local ? ' local-mod' : '') + '" onclick="openDetail(' + x.id + ')">' +
    '<button class="tc-toggle' + toggleCls + '" onclick="event.stopPropagation();toggleComplete(' + x.id + ')" title="' + (done ? '点击恢复待办' : '点击标记完成') + '">' + (done ? '✓' : '') + '</button>' +
    '<div class="tt">' + x.t + localBadge + '</div>' +
    dsHtml +
    '<div class="mg">' +
      '<span class="bg ' + pc + '">' + x.p + '</span>' +
      '<span class="bg ' + cc + '">' + x.c + '</span>' +
      '<span class="bg bd">' + x.d + '</span>' +
      extraPg +
    '</div>' +
    '<div class="pb"><div class="pf" style="width:' + x.pg + '%;background:' + pg + '"></div></div>' +
  '</div>';
}

// Get filtered tasks (from merged data)
function getFiltered() {
  var data = getMergedTasks();
  // Category filter
  if (filterCat !== "全部") {
    var result = [];
    for (var i = 0; i < data.length; i++) {
      if (data[i].c === filterCat) result.push(data[i]);
    }
    data = result;
  }
  // Search filter
  if (searchQuery !== "") {
    var q = searchQuery.toLowerCase();
    var result = [];
    for (var i = 0; i < data.length; i++) {
      var t = data[i];
      if ((t.t && t.t.toLowerCase().indexOf(q) !== -1) ||
          (t.ds && t.ds.toLowerCase().indexOf(q) !== -1) ||
          (t.c && t.c.toLowerCase().indexOf(q) !== -1)) {
        result.push(t);
      }
    }
    data = result;
  }
  return data;
}

// Get all categories
function getCategories() {
  var cats = {};

// Render stats bar
function renderStats(data) {
  var urgent = 0, todo = 0, wait = 0, done = 0;

// Render kanban board
function renderKanban(data) {
  var tdList = [], wtList = [], dnList = [];
  for (var i = 0; i < data.length; i++) {
    if (data[i].s === "待办" || data[i].s === "进行中") tdList.push(data[i]);
    else if (data[i].s === "等待") wtList.push(data[i]);
    else if (data[i].s === "已完成") dnList.push(data[i]);
  }

  function sortP(a,b){return(pOrd[a.p]||2)-(pOrd[b.p]||2);}
  tdList.sort(sortP);
  wtList.sort(sortP);
  dnList.sort(sortP);

  var htmlTd = "", htmlWt = "";
  for (var j = 0; j < tdList.length; j++) htmlTd += makeCard(tdList[j]);
  for (var j = 0; j < wtList.length; j++) htmlWt += makeCard(wtList[j]);

  document.getElementById("kb-todo").innerHTML = htmlTd || '<div class="empty">暂无待办 &#127881;</div>';
  document.getElementById("kb-wait").innerHTML = htmlWt || '<div class="empty">暂无等待</div>';

  // Collapsed "已完成" column
  var dnHtml = '<div style="text-align:center;padding:8px 4px">';

  dnHtml += '<div style="font-size:10px;color:#9ca3b8;margin:2px 0 6px">条任务已完成</div>';
  // Show latest 3 completed
  var recent = dnList.slice(-3).reverse();
  for (var ri = 0; ri < recent.length; ri++) {
    dnHtml += '<div style="font-size:11px;color:#778ca3;text-align:left;padding:3px 4px;border-bottom:1px solid #232738;display:flex;align-items:center;gap:4px">';
    dnHtml += '<span style="color:#2ed573;font-size:10px">&#10003;</span>';
    dnHtml += '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">' + recent[ri].t + '</span>';
    dnHtml += '<span style="color:#5a6078;font-size:9px">' + (recent[ri].d||'') + '</span>';
    dnHtml += '</div>';
  }
  dnHtml += '<div style="margin-top:10px;padding:6px 12px;background:rgba(46,213,115,.12);color:#2ed573;border-radius:6px;font-size:12px;font-weight:600;display:inline-block">点击查看全部 &#8599;</div>';
  dnHtml += '</div>';
  document.getElementById("kb-done-summary").innerHTML = dnHtml;
}

// Render timeline
function renderTimeline(data) {
  var groups = {};
  for (var i = 0; i < data.length; i++) {
    var d = data[i].d;
    if (!groups[d]) groups[d] = [];
    groups[d].push(data[i]);
  }

  var dates = Object.keys(groups).sort();
  var html = "";

  for (var di = 0; di < dates.length; di++) {
    var d = dates[di];
    var cls = d === TODAY ? "today" : (d < TODAY ? "past" : "");
    var label = d === TODAY ? d + " &#128205; 今天" : d;

    html += '<div class="tg">';
    html += '<div class="tldate ' + cls + '">' + label + '</div>';

    var items = groups[d];
    items.sort(function(a,b){return(pOrd[a.p]||2)-(pOrd[b.p]||2);});
    for (var ji = 0; ji < items.length; ji++) {
      html += makeCard(items[ji]);
    }
    html += '</div>';
  }

  document.getElementById("tlbox").innerHTML = html || '<div class="empty">暂无任务</div>';
}

var doneSortBy = "date";

function sortDone(type) {
  doneSortBy = type;
  document.getElementById("doneSortDate").className = "fb" + (type === "date" ? " on" : "");
  document.getElementById("doneSortCat").className = "fb" + (type === "cat" ? " on" : "");

  data.sort(function(a,b){return(pOrd[a.p]||2)-(pOrd[b.p]||2);});

// Render completed-only view
function renderDone(data) {
  // Filter only completed tasks
  var doneTasks = [];
  for (var i = 0; i < data.length; i++) {
    if (data[i].s === "已完成") doneTasks.push(data[i]);
  }

  if (doneTasks.length === 0) {
    document.getElementById("donebox").innerHTML = '<div class="empty">暂无已完成任务 &#128531;</div>';
    document.getElementById("doneStats").textContent = "";
    return;
  }

  // Sort
  if (doneSortBy === "date") {
    doneTasks.sort(function(a,b){ return (b.d||"0") < (a.d||"0") ? -1 : (b.d||"0") > (a.d||"0") ? 1 : 0; });
  } else {
    doneTasks.sort(function(a,b){ return a.c < b.c ? -1 : a.c > b.c ? 1 : (b.d||"0") < (a.d||"0") ? -1 : 1; });
  }

  // Stats
  var catStats = {};
  for (var i = 0; i < doneTasks.length; i++) {
    var c = doneTasks[i].c;
    if (!catStats[c]) catStats[c] = 0;
    catStats[c]++;
  }
  var catKeys = Object.keys(catStats).sort(function(a,b){ return catStats[b] - catStats[a]; });

  // Update stats
  var statsHtml = '共 <strong style="color:#2ed573">' + doneTasks.length + '</strong> 条已完成';
  if (catKeys.length > 0) {
    statsHtml += ' &middot; ';
    statsHtml += catKeys.map(function(k){ return k + ' ' + catStats[k]; }).join(' &middot; ');
  }
  document.getElementById("doneStats").innerHTML = statsHtml;

  // Group by date or category
  var html = '';

  if (doneSortBy === "date") {
    // Group by date
    var groups = {};
    for (var i = 0; i < doneTasks.length; i++) {
      var d = doneTasks[i].d || "未排期";
      if (!groups[d]) groups[d] = [];
      groups[d].push(doneTasks[i]);
    }
    var dates = Object.keys(groups).sort(function(a,b){ return a < b ? 1 : a > b ? -1 : 0; });

    for (var di = 0; di < dates.length; di++) {
      var d = dates[di];
      var cls = d === "未排期" ? "" : "";
      var dayLabel = d;
      if (d === TODAY) dayLabel = d + " &#128205; 今天";
      html += '<div class="tg">';
      html += '<div class="tldate" style="color:#2ed573">' + dayLabel + ' <span style="font-size:10px;color:#9ca3b8;font-weight:400">(' + groups[d].length + ')</span></div>';
      groups[d].sort(function(a,b){return(pOrd[a.p]||2)-(pOrd[b.p]||2);});
      for (var ji = 0; ji < groups[d].length; ji++) {
        html += makeCard(groups[d][ji]);
      }
      html += '</div>';
    }
  } else {
    // Group by category
    var catGroups = {};
    for (var i = 0; i < doneTasks.length; i++) {
      var c = doneTasks[i].c;
      if (!catGroups[c]) catGroups[c] = [];
      catGroups[c].push(doneTasks[i]);
    }
    var sortedCats = Object.keys(catGroups).sort();
    for (var ci = 0; ci < sortedCats.length; ci++) {
      var c = sortedCats[ci];
      html += '<div class="tg">';
      var cc = c === "私人事务" ? "#ec64a6" : "#6c8cff";
      html += '<div class="tldate" style="color:' + cc + '">' + c + ' <span style="font-size:10px;color:#9ca3b8;font-weight:400">(' + catGroups[c].length + ')</span></div>';
      catGroups[c].sort(function(a,b){ return (b.d||"0") < (a.d||"0") ? -1 : (b.d||"0") > (a.d||"0") ? 1 : 0; });
      for (var ji = 0; ji < catGroups[c].length; ji++) {
        html += makeCard(catGroups[c][ji]);
      }
      html += '</div>';
    }
  }

  document.getElementById("donebox").innerHTML = html;
}

// Render Gantt chart
function renderGantt(data) {
  // Filter tasks with dates
  var withDates = [];
  var noDates = [];
  for (var i = 0; i < data.length; i++) {
    if (data[i].d && data[i].d !== "") withDates.push(data[i]);
    else noDates.push(data[i]);
  }
  // Sort by date
  withDates.sort(function(a,b){ return (a.d||"") < (b.d||"") ? -1 : 1; });

  if (withDates.length === 0) {
    document.getElementById("ganttBox").innerHTML = '<div class="empty">暂无带日期的任务</div>';
    return;
  }

  // Find date range
  var minDate = withDates[0].d;
  var maxDate = withDates[0].d;
  for (var i = 0; i < withDates.length; i++) {
    if (withDates[i].d < minDate) minDate = withDates[i].d;
    if (withDates[i].d > maxDate) maxDate = withDates[i].d;
  }

  // Extend range: start from Monday of the week containing minDate, end to Sunday of week containing maxDate
  var minD = new Date(minDate + "T00:00:00");
  var maxD = new Date(maxDate + "T00:00:00");
  minD.setDate(minD.getDate() - minD.getDay() + 1); // Monday
  maxD.setDate(maxD.getDate() - maxD.getDay() + 7); // Next Sunday

  // Generate week columns
  var weeks = [];
  var cur = new Date(minD);
  var todayD = TODAY;
  while (cur <= maxD) {
    var weekStart = new Date(cur);
    var weekEnd = new Date(cur);
    weekEnd.setDate(weekStart.getDate() + 6);
    var ws = formatDate(weekStart);
    var we = formatDate(weekEnd);
    var isThisWeek = (todayD >= ws && todayD <= we);
    weeks.push({ start: ws, end: we, label: ws.substring(5) + "~" + we.substring(5), today: isThisWeek });
    cur.setDate(cur.getDate() + 7);
  }

  // Build table
  var html = '<div class="gantt-wrap"><table>';
  // Header
  html += '<tr><th style="min-width:100px;position:sticky;left:0;z-index:6;background:#151720">任务</th><th style="min-width:50px;position:sticky;left:100px;z-index:6;background:#151720">进展</th>';
  for (var wi = 0; wi < weeks.length; wi++) {
    html += '<th class="' + (weeks[wi].today ? 'g-today' : '') + '" style="min-width:44px" title="' + weeks[wi].start + ' ~ ' + weeks[wi].end + '">' + weeks[wi].label + '</th>';
  }
  html += '</tr>';

  // Rows
  var barColors = {"已完成":"g-done","待办":"g-progress","进行中":"g-progress","等待":"g-wait"};

  for (var ri = 0; ri < withDates.length; ri++) {
    var t = withDates[ri];
    var taskDate = t.d;
    var statusCls = barColors[t.s] || "g-wait";
    var doneMark = t.s === "已完成" ? " done" : "";

    html += '<tr>';
    html += '<td style="position:sticky;left:0;background:#151720;z-index:3" title="' + t.t + '"><div class="gantt-task-name' + doneMark + '">' + t.t + '</div></td>';
    html += '<td style="position:sticky;left:100px;background:#151720;z-index:3;text-align:center;font-size:10px;color:#9ca3b8">' + t.pg + '%</td>';

    for (var wi = 0; wi < weeks.length; wi++) {
      var w = weeks[wi];
      var inWeek = (taskDate >= w.start && taskDate <= w.end);
      if (inWeek) {
        // Calculate position within the week (day of week offset)
        var td = new Date(taskDate + "T00:00:00");
        var dayOfWeek = td.getDay();
        var wsD = new Date(w.start + "T00:00:00");
        var dayOffset = Math.floor((td - wsD) / 86400000);
        var leftPct = (dayOffset / 7) * 100;
        html += '<td style="text-align:left;position:relative" title="' + t.t + ' (' + taskDate + ')"><div class="gantt-bar ' + statusCls + '" style="width:60%;margin-left:' + leftPct + '%"></div></td>';
      } else {
        html += '<td></td>';
      }
    }
    html += '</tr>';
  }
  html += '</table></div>';

  // No-date tasks
  if (noDates.length > 0) {
    html += '<div style="margin-top:12px;padding:10px;background:#1a1d28;border-radius:8px;border:1px solid #2a2e3f">';
    html += '<div style="font-size:11px;color:#9ca3b8;margin-bottom:6px;font-weight:600">未排期任务 (' + noDates.length + ')</div>';
    for (var ni = 0; ni < noDates.length; ni++) {
      var nt = noDates[ni];
      var npc = pCls[nt.p] || "bm";
      html += '<div style="font-size:10.5px;padding:2px 0;color:' + (nt.s === "已完成" ? "#778ca3" : "#c4c9d4") + '">' + (nt.s === "已完成" ? '<s>' + nt.t + '</s>' : nt.t) + ' <span class="bg ' + npc + '">' + nt.p + '</span></div>';
    }
    html += '</div>';
  }

  document.getElementById("ganttBox").innerHTML = html;
}

// Helper: format date
function formatDate(d) {
  var y = d.getFullYear();
  var m = String(d.getMonth()+1).padStart(2,'0');
  var dd = String(d.getDate()).padStart(2,'0');
  return y+"-"+m+"-"+dd;
}

// Weekly navigation
var weekOffset = 0;

function changeWeek(delta) {
  weekOffset += delta;
  doRender();
  // Scroll to weekly view
  var wv = document.getElementById("v-weekly");
  if (wv) wv.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetWeek() {
  weekOffset = 0;
  doRender();
}

// Render Weekly Summary
function renderWeekly(data) {
  // Get week range based on offset (Mon-Sun)
  var now = new Date();
  now.setDate(now.getDate() + weekOffset * 7);
  var dayOfWeek = now.getDay();
  var monday = new Date(now);
  monday.setDate(now.getDate() - dayOfWeek + 1);
  var sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  var ws = formatDate(monday);
  var we = formatDate(sunday);

  // Categorize tasks
  var thisWeek = [];
  var overdue = [];
  var completedThisWeek = []; // Tasks completed (can be from any date but we show recent)
  for (var i = 0; i < data.length; i++) {
    var t = data[i];
    var td = t.d;
    // Due this week
    if (td && td >= ws && td <= we && t.s !== "已完成") {
      thisWeek.push(t);
    }
    // Overdue (due before today but not completed)
    if (td && td < TODAY && td !== "" && t.s !== "已完成") {
      overdue.push(t);
    }
    // Completed tasks (show all recently completed)
    if (t.s === "已完成") {
      completedThisWeek.push(t);
    }
  }

  // Sort
  var sortP = function(a,b){return(pOrd[a.p]||2)-(pOrd[b.p]||2);};
  thisWeek.sort(sortP);
  overdue.sort(sortP);
  completedThisWeek.sort(function(a,b){ return (b.d||"") < (a.d||"") ? -1 : 1; });

  // Stats
  var total = data.length;
  var doneCount = 0, todoCount = 0, waitCount = 0, urgentCount = 0;
  for (var i = 0; i < data.length; i++) {
    if (data[i].s === "已完成") doneCount++;
    else if (data[i].s === "等待") waitCount++;
    else todoCount++;
    if (data[i].p === "紧急" && data[i].s !== "已完成") urgentCount++;
  }

  var html = '';
  // Week header with navigation
  html += '<div style="background:linear-gradient(135deg,#1a1d28,#252a3a);border-radius:10px;padding:14px;border:1px solid #2a2e3f;margin-bottom:10px">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center">';
  html += '<div style="display:flex;align-items:center;gap:8px">';
  html += '<button onclick="changeWeek(-1)" style="background:#2a2e3f;border:1px solid #3a3f55;color:#9ca3b8;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-weight:600">&larr; 上周</button>';
  html += '<button onclick="changeWeek(1)" style="background:#2a2e3f;border:1px solid #3a3f55;color:#9ca3b8;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-weight:600">下周 &rarr;</button>';
  html += '</div>';
  html += '<div style="text-align:center">';
  html += '<div style="font-size:14px;font-weight:700;color:#6c8cff">' + (weekOffset === 0 ? '本周' : (weekOffset < 0 ? (-weekOffset) + '周前' : weekOffset + '周后')) + ' · 第 ' + getWeekNumber(monday) + ' 周</div>';
  html += '<div style="font-size:10px;color:#9ca3b8;margin-top:2px">' + ws + ' ~ ' + we + '</div>';
  html += '</div>';
  html += '<div style="display:flex;align-items:center;gap:8px">';
  if (weekOffset !== 0) {
    html += '<button onclick="resetWeek()" style="background:rgba(108,140,255,.15);border:1px solid rgba(108,140,255,.3);color:#6c8cff;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:600">回到本周</button>';
  } else {
    html += '<span style="width:70px"></span>';
  }
  html += '</div>';
  html += '</div></div>';

  // Weekly AI Summary
  var wn = getWeekNumber(monday);

    html += '<div style="background:linear-gradient(135deg,#1a2428,#1a1d28);border:1px solid #2a5065;border-radius:10px;padding:14px;margin-bottom:10px">';
    html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">';
    html += '<span style="font-size:12px;color:#4fc3f7;font-weight:700">&#128220; 本周AI总结</span>';
    html += '<span style="font-size:9px;color:#9ca3b8">(自动生成·每周日23:00)</span>';
    html += '</div>';
    html += '<div style="font-size:12px;color:#c4c9d4;line-height:1.7;padding:8px;background:rgba(79,195,247,.06);border-radius:6px">' + sumText.replace(/\n/g, '<br>') + '</div>';
    html += '</div>';
  }

  // Stats grid
  html += '<div class="ws-stat-group">';

  html += '<div class="ws-stat"><div class="num" style="color:#ff9f43">' + todoCount + '</div><div class="lab">进行中</div></div>';

  html += '<div class="ws-stat"><div class="num" style="color:#778ca3">' + waitCount + '</div><div class="lab">等待中</div></div>';

  html += '<div class="ws-grid">';

    html += '<div class="ws-stat" style="background:#0f1117;border-radius:8px;padding:10px;text-align:center"><div class="num" style="font-size:20px;font-weight:800;color:' + (ds.rate > 50 ? '#2ed573' : '#ff9f43') + '">' + ds.rate + '%</div><div class="lab" style="font-size:9px;color:#9ca3b8;margin-top:2px">完成率</div></div>';
    html += '<div class="ws-stat" style="background:#0f1117;border-radius:8px;padding:10px;text-align:center"><div class="num" style="font-size:20px;font-weight:800;color:#ff9f43">' + ds.thisWeekDone + '</div><div class="lab" style="font-size:9px;color:#9ca3b8;margin-top:2px">本周完成</div></div>';
    html += '<div class="ws-stat" style="background:#0f1117;border-radius:8px;padding:10px;text-align:center"><div class="num" style="font-size:20px;font-weight:800;color:#ff4d6a">' + (ds.urgentTotal - ds.urgentDone) + '/' + ds.urgentTotal + '</div><div class="lab" style="font-size:9px;color:#9ca3b8;margin-top:2px">紧急未完成</div></div>';
    html += '</div>';
    // Category completion
    var catKeys = Object.keys(ds.catCount).sort(function(a,b){ return ds.catCount[b] - ds.catCount[a]; });
    for (var ci = 0; ci < catKeys.length; ci++) {
      var ck = catKeys[ci];
      var cDone = ds.catDone[ck] || 0;
      var cTotal = ds.catCount[ck];
      var cPct = Math.round(cDone / cTotal * 100);
      html += '<div class="ws-item" style="font-size:11px;padding:4px 0;border-bottom:1px solid #232738;display:flex;align-items:center;gap:6px"><span style="flex:1;color:#c4c9d4">' + ck + '</span><span style="color:#9ca3b8;font-size:10px">' + cDone + '/' + cTotal + '</span><div class="pb" style="width:60px;margin:0"><div class="pf" style="width:' + cPct + '%;background:#6c8cff"></div></div></div>';
    }
    html += '</div>';

    // Chart card
    html += '<div class="chart-wrap" style="background:#1a1d28;border-radius:10px;padding:14px;border:1px solid #2a2e3f;margin-bottom:0"><h3 style="font-size:12px;font-weight:700;margin-bottom:10px;color:#6c8cff">近14天完成趋势</h3><div id="trendChartBox" style="height:180px"></div></div>';
    html += '</div>'; // stats grid
  }

  document.getElementById("weeklyBox").innerHTML = html;
}

function getWeekNumber(d) {
  var start = new Date(d.getFullYear(), 0, 1);
  var diff = d - start + (start.getTimezoneOffset() - d.getTimezoneOffset()) * 60000;
  return Math.ceil((diff / 86400000 + start.getDay() - 1) / 7);
}

// Render Calendar view
var calYear, calMonth;
function renderCalendar(data) {
  var now = new Date();
  if (!calYear || !calMonth) { calYear = now.getFullYear(); calMonth = now.getMonth() + 1; }

  var firstDay = new Date(calYear, calMonth - 1, 1);
  var lastDay = new Date(calYear, calMonth, 0);
  var totalDays = lastDay.getDate();
  var startDow = firstDay.getDay(); // 0=Sun

  // Build date -> tasks map
  var dateMap = {};
  for (var i = 0; i < data.length; i++) {
    var dd = data[i].d;
    if (!dd || dd === "") continue;
    if (!dateMap[dd]) dateMap[dd] = [];
    dateMap[dd].push(data[i]);
  }

  // Month names
  var months = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

  var html = '';
  // Header
  html += '<div class="cal-header">';
  html += '<button onclick="changeMonth(-1)">&larr; 上月</button>';
  html += '<span class="cal-month">' + calYear + '年 ' + months[calMonth-1] + '</span>';
  html += '<button onclick="changeMonth(1)">下月 &rarr;</button>';
  html += '<button onclick="goToToday()" style="font-size:10px">今天</button>';
  html += '</div>';

  // Legend
  html += '<div style="display:flex;gap:12px;font-size:10px;color:#9ca3b8;margin-bottom:8px;justify-content:center">';
  html += '<span><span class="cal-dot done-bg" style="display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-right:3px"></span>已完成</span>';
  html += '<span><span class="cal-dot todo-bg" style="display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-right:3px"></span>待办</span>';
  html += '<span><span class="cal-dot wait-bg" style="display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-right:3px"></span>等待</span>';
  html += '</div>';

  // Day of week header
  var dows = ["日","一","二","三","四","五","六"];
  html += '<div class="cal-grid">';
  for (var di = 0; di < 7; di++) {
    html += '<div class="cal-dow">' + dows[di] + '</div>';
  }

  // Fill leading empty cells
  var prevMonth = calMonth === 1 ? 12 : calMonth - 1;
  var prevYear = calMonth === 1 ? calYear - 1 : calYear;
  var prevLastDay = new Date(prevYear, prevMonth, 0).getDate();
  for (var pi = 0; pi < startDow; pi++) {
    var pd = prevLastDay - startDow + pi + 1;
    var pds = formatDateStr(prevYear, prevMonth, pd);
    html += '<div class="cal-day other"><div class="cal-dnum">' + pd + '</div><div class="cal-dots"></div></div>';
  }

  // Days of this month
  for (var d = 1; d <= totalDays; d++) {
    var ds = formatDateStr(calYear, calMonth, d);
    var isToday = (ds === TODAY);
    var tasksForDay = dateMap[ds] || [];
    var hasDone = false, hasTodo = false, hasWait = false;

    // Dots
    var dotsHtml = '';
    for (var ti = 0; ti < Math.min(tasksForDay.length, 5); ti++) {
      var tt = tasksForDay[ti];
      if (tt.s === "已完成") { hasDone = true; dotsHtml += '<span class="cal-dot done-bg"></span>'; }
      else if (tt.s === "等待") { hasWait = true; dotsHtml += '<span class="cal-dot wait-bg"></span>'; }
      else { hasTodo = true; dotsHtml += '<span class="cal-dot todo-bg"></span>'; }
    }
    if (tasksForDay.length > 5) dotsHtml += '<span style="font-size:8px;color:#9ca3b8">+' + (tasksForDay.length-5) + '</span>';

    // Popup
    var popHtml = '';
    if (tasksForDay.length > 0) {
      popHtml = '<div class="cal-day-pop">';
      for (var pi = 0; pi < tasksForDay.length; pi++) {
        var pt = tasksForDay[pi];
        var psc = pt.s === "已完成" ? "done-c" : (pt.s === "等待" ? "wait-c" : "todo-c");
        popHtml += '<div class="cp-item"><span class="cp-status ' + psc + '">' + pt.s + '</span><span style="color:#c4c9d4">' + pt.t + '</span></div>';
      }
      popHtml += '</div>';
    }

    html += '<div class="cal-day' + (isToday ? ' today' : '') + '" onclick="showDateTasks(\'' + ds + '\')">';
    html += '<div class="cal-dnum">' + d + '</div>';
    html += '<div class="cal-dots">' + dotsHtml + '</div>';
    html += popHtml;
    html += '</div>';
  }

  // Fill trailing empty cells
  var endDow = (startDow + totalDays) % 7;
  if (endDow > 0) {
    var trailingCells = 7 - endDow;
    for (var ti = 1; ti <= trailingCells; ti++) {
      html += '<div class="cal-day other"><div class="cal-dnum">' + ti + '</div><div class="cal-dots"></div></div>';
    }
  }

  html += '</div>'; // cal-grid

  document.getElementById("calBox").innerHTML = html;
}

function formatDateStr(y, m, d) {
  return y + "-" + String(m).padStart(2,'0') + "-" + String(d).padStart(2,'0');
}

function changeMonth(delta) {
  var now = new Date();
  if (!calYear || !calMonth) { calYear = now.getFullYear(); calMonth = now.getMonth() + 1; }
  calMonth += delta;
  if (calMonth > 12) { calMonth = 1; calYear++; }
  if (calMonth < 1) { calMonth = 12; calYear--; }
  doRender();
}

function goToToday() {
  var now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth() + 1;
  doRender();
}

// Show tasks for a specific date
function showDateTasks(dateStr) {
  var merged = getMergedTasks();
  var tasks = [];
  for (var i = 0; i < merged.length; i++) {
    if (merged[i].d === dateStr) tasks.push(merged[i]);
  }
  if (tasks.length === 0) return;

  var html = '<div style="font-size:12px;color:#6c8cff;margin-bottom:8px">' + dateStr + ' 任务 (' + tasks.length + ')</div>';
  for (var i = 0; i < tasks.length; i++) {
    html += makeCard(tasks[i]);
  }
  document.getElementById("detailMd").innerHTML = html + '<div style="margin-top:8px"><button onclick="closeMo()" style="background:#3a3f55;color:#9ca3b8;padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none">关闭</button></div>';
  document.getElementById("detailMo").classList.add("show");
}

// Main render function
function doRender() {
  var data = getFiltered();
  data.sort(function(a,b){return(pOrd[a.p]||2)-(pOrd[b.p]||2);});
  renderStats(data);
  renderKanban(data);
  renderTimeline(data);
  renderGantt(data);
  renderWeekly(data);
  renderCalendar(data);
  renderAll(data);
  renderDone(data);
  renderFilters();
  // Render trend chart after weekly is rendered
  setTimeout(function(){
    var activeTab = document.querySelector(".tab.on");
    if (activeTab && activeTab.textContent.trim() === "周总结") {
      renderTrendChart(getMergedTasks());
    }
  }, 100);
}

// Tab switching
function switchTab(name, tabEl) {
  var tabs = document.querySelectorAll(".tab");
  var views = document.querySelectorAll(".vw");
  for (var i = 0; i < tabs.length; i++) tabs[i].className = "tab";
  for (var i = 0; i < views.length; i++) {
    views[i].className = "vw";
    views[i].style.display = "";
  }
  tabEl.className = "tab on";
  var vw = document.getElementById("v-" + name);
  if (vw) vw.className = "vw on";
  // Re-render calendar if switching to it
  if (name === "calendar") renderCalendar(getFiltered());
  if (name === "done") renderDone(getMergedTasks());
  // Render trend chart for weekly
  if (name === "weekly") {
    setTimeout(function(){ renderTrendChart(getMergedTasks()); }, 50);
  }
}

// Filter
function setFilter(cat) {
  filterCat = cat;
  doRender();
}

// Open detail modal
function openDetail(id) {
  var merged = getMergedTasks();
  var x = null;
  for (var i = 0; i < merged.length; i++) {
    if (merged[i].id === id) { x = merged[i]; break; }
  }
  if (!x) return;

  var pc = pCls[x.p] || "bm";
  var sc = x.s === "已完成" ? "#2ed573" : (x.s === "待办" ? "#ff9f43" : (x.s === "进行中" ? "#ff9f43" : "#778ca3"));
  var cc = x.c === "私人事务" ? "bp" : "bc";

  var md = document.getElementById("detailMd");

  // Format description: break multi-event descriptions into bullet points
  var ds = x.ds || '';
  var dsHtml = '';
  // Split by common separators and filter empty items
  var items = ds.split(/[；;。\n]+/).map(function(s){return s.trim();}).filter(function(s){return s.length > 0;});
  if (items.length > 1 && ds.length > 80) {
    dsHtml = '<div class="vl">';
    for (var di = 0; di < items.length; di++) {
      dsHtml += '<span class="ds-bullet">' + items[di] + '</span>';
    }
    dsHtml += '</div>';
  } else {
    dsHtml = '<div class="vl">' + ds + '</div>';
  }

  md.innerHTML =
    '<h2>' + x.t + (x._local ? ' <span class="blocal">本地修改</span>' : '') + '</h2>' +
    '<div class="fl"><label>详细说明</label>' + dsHtml + '</div>' +
    '<div class="fl" style="display:flex;gap:14px;flex-wrap:wrap">' +
      '<div><label>类别</label><div class="vl"><span class="bg ' + cc + '">' + x.c + '</span></div></div>' +
      '<div><label>优先级</label><div class="vl"><span class="bg ' + pc + '">' + x.p + '</span></div></div>' +
      '<div><label>状态</label><div class="vl" style="font-weight:700;color:' + sc + '">' + x.s + '</div></div>' +
      '<div><label>截止日期</label><div class="vl">&#128197; ' + x.d + '</div></div>' +
      '<div><label>进度</label><div class="vl">' + x.pg + '%</div></div>' +
    '</div>' +
    '<div class="ac" style="display:flex;gap:8px">' +
      '<button class="btn" style="background:' + (x.s === '已完成' ? '#ff4d6a' : '#2ed573') + ';color:#fff;padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none" onclick="toggleComplete(' + x.id + ');closeMo()">' + (x.s === '已完成' ? '恢复待办' : '标记完成') + '</button>' +
      '<button class="btn" style="background:#3a3f55;color:#9ca3b8;padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none" onclick="closeMo()">关闭</button>' +
    '</div>';

  document.getElementById("detailMo").classList.add("show");
}

function closeMo() {
  document.getElementById("detailMo").classList.remove("show");
}

// ===== INIT =====
fetchData(function() {
  updateSyncUI();
  doRender();

  // Notification permission check
  if ("Notification" in window && Notification.permission === "granted") {
    updateNotifBadge(true);
    checkTodayTasks();
  }
});

// Auto refresh every 20 seconds for near-real-time
var lastFetchTime = Date.now();
setInterval(function() {
  var secs = Math.round((Date.now() - lastFetchTime) / 1000);
  var btn = document.getElementById("refreshTimer");
  if (btn) btn.textContent = secs + "s";
  var ageEl = document.getElementById("dataAge");
  if (ageEl) {
    if (secs < 60) ageEl.textContent = "· " + secs + "秒前更新";
    else ageEl.textContent = "· " + Math.round(secs/60) + "分钟前更新";
  }
  if (secs >= 20) {
    fetchData(function() {
      updateSyncUI();
      doRender();
      lastFetchTime = Date.now();
      if (btn) btn.textContent = "";
    });
  }
}, 1000);

// Override fetchData to track time
var _origFetchCb = null;
</script>
