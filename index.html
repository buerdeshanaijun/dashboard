      var uTag = u.tag || 'update';
      var uTagI = tagIcon(uTag);
      upHtml += '<span class="ud-tag ' + uTag + '" style="flex-shrink:0;margin-top:1px">' + uTagI + ' ' + tagLabel(uTag) + '</span>';
      upHtml += '<span style="color:#6c8cff;font-weight:600;white-space:nowrap;font-size:11px;min-width:72px">📅 ' + u.d + '</span>';
      upHtml += '<span>' + u.t + '</span>';
      upHtml += '</div>';
    }
    upHtml += '</div></div>';

// ===== PROJECT OVERVIEW =====
function renderOverview(data) {
  var box = document.getElementById("overviewBox");
  // Group by category
  var groups = {};
  for (var i = 0; i < data.length; i++) {
    var t = data[i];
    if (!groups[t.c]) groups[t.c] = { tasks: [], done: 0, total: 0 };
    groups[t.c].tasks.push(t);
    groups[t.c].total++;
    if (t.s === "已完成") groups[t.c].done++;
  }
  var cats = Object.keys(groups).sort();
  var html = '<div class="ov-grid">';
  for (var ci = 0; ci < cats.length; ci++) {
    var g = groups[cats[ci]];
    // Exclude cancelled tasks from counts
    var activeTasks = [], cancelledTasks = [];
    for (var ti = 0; ti < g.tasks.length; ti++) {
      if (g.tasks[ti].s === '已取消') cancelledTasks.push(g.tasks[ti]);
      else activeTasks.push(g.tasks[ti]);
    }
    var activeTotal = activeTasks.length;
    var activeDone = 0;
    for (var ti = 0; ti < activeTotal; ti++) { if (activeTasks[ti].s === '已完成') activeDone++; }
    var pct = activeTotal > 0 ? Math.round(activeDone / activeTotal * 100) : 0;
    var barColor = pct === 100 ? "#2ed573" : pct > 50 ? "#ff9f43" : "#ff4d6a";
    html += '<div class="ov-card">' +
      '<h3>' + cats[ci] + '</h3>' +
      '<div class="ov-num" style="color:' + barColor + '">' + activeDone + '/' + activeTotal + '</div>' +
      '<div class="ov-progress"><div class="ov-bar" style="width:' + pct + '%;background:' + barColor + '"></div></div>' +
      '<div class="ov-stat-row"><span class="ov-label">完成率</span><span>' + pct + '%</span></div>';
    // List task names
    html += '<div style="margin-top:6px">';
    for (var ti = 0; ti < activeTasks.length; ti++) {
      var t = activeTasks[ti];
      var ic = t.s === "已完成" ? "&#9989;" : (t.s === "等待" ? "&#9203;" : (t.p === "紧急" ? "&#128308;" : "&#128309;"));
      html += '<div style="font-size:10px;color:#9ca3b8;padding:1px 0;display:flex;gap:4px;align-items:center">' +
        '<span>' + ic + '</span><span' + (t.s === "已完成" ? ' style="text-decoration:line-through;color:#5a6078"' : '') + '>' + t.t.slice(0,25) + '</span></div>';
    }
    for (var ti = 0; ti < cancelledTasks.length; ti++) {
      html += '<div style="font-size:10px;color:#5a6078;padding:1px 0;display:flex;gap:4px;align-items:center">' +
        '<span>&#10062;</span><span style="text-decoration:line-through;color:#5a6078">' + cancelledTasks[ti].t.slice(0,25) + '</span></div>';
    }
    html += '</div></div>';
  }
  html += '</div>';
  box.innerHTML = html;
}

// ===== BATCH MODE =====
var batchSelected = {};

function toggleBatchMode() {
  document.body.classList.toggle('batch-mode');
  if (!document.body.classList.contains('batch-mode')) {
    batchSelected = {};
  }
  doRender();
}

function toggleBatchSelect(id) {
  var el = document.getElementById('tsel-' + id);
  if (batchSelected[id]) {
    delete batchSelected[id];
    if (el) el.classList.remove('checked');
  } else {
    batchSelected[id] = true;
    if (el) el.classList.add('checked');
  }
  updateBatchBar();
}

function updateBatchBar() {
  var ids = Object.keys(batchSelected);
  var count = ids.length;
  var bar = document.getElementById('batchBar');
  var cnt = document.getElementById('batchCount');
  if (!bar || !cnt) return;
  if (count > 0) {
    bar.classList.add('show');
    cnt.textContent = '已选 ' + count + ' 项';
  } else {
    bar.classList.remove('show');
  }
}

function batchMarkDone() {
  var ids = Object.keys(batchSelected);
  var changes = loadLocalChanges();
  for (var i = 0; i < ids.length; i++) {
    var id = parseInt(ids[i]);
    if (!changes[id]) changes[id] = {};
    changes[id].s = '已完成';
  }
  saveLocalChanges(changes);
  batchSelected = {};
  updateBatchBar();
  document.body.classList.remove('batch-mode');
  doRender();
  showToast('已标记 ' + ids.length + ' 项完成');
}

function batchMarkDelete() {
  var ids = Object.keys(batchSelected);
  var changes = loadLocalChanges();
  for (var i = 0; i < ids.length; i++) {
    var id = parseInt(ids[i]);
    if (!changes[id]) changes[id] = {};
    changes[id]._deleted = true;
  }
  saveLocalChanges(changes);
  batchSelected = {};
  updateBatchBar();
  document.body.classList.remove('batch-mode');
  doRender();
  showToast('已删除 ' + ids.length + ' 项');

// ===== TREE VIEW (Force-Directed Graph) =====
var treeEditId = null;

function loadD3(callback) {
  if (typeof d3 !== 'undefined') { callback(); return; }
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js';
  s.onload = callback;
  document.body.appendChild(s);
}

function renderTree() {
  loadD3(function() {
    var data = getMergedTasks();
    var container = document.getElementById('treeBox');
    container.innerHTML = '';
    container.style.cssText = 'width:100%;height:80vh;background:#0f1117;border-radius:8px;overflow:hidden;position:relative';

    if (data.length === 0) {
      container.innerHTML = '<div class="empty" style="padding:40px">暂无任务</div>';
      return;
    }

    var w = container.clientWidth || 900;
    var h = Math.max(600, window.innerHeight * 0.75);
    var cx = w / 2, cy = h / 2;

    var svg = d3.select('#treeBox').append('svg')
      .attr('width', w).attr('height', h)
      .style('width', '100%').style('height', '100%')
      .style('display', 'block').style('background', '#0f1117');

    // Enable zoom + prevent page scroll
    var zoom = d3.zoom()
      .scaleExtent([0.2, 5])
      .on('zoom', function(event) {
        containerG.attr('transform', event.transform);
      });
    svg.call(zoom);
    svg.on('wheel.zoom', function(event) { event.preventDefault(); });
    svg.on('dblclick.zoom', null);

    var containerG = svg.append('g');

    // Arrow marker for links
    svg.append('defs').append('marker')
      .attr('id', 'arrow').attr('viewBox', '0 -5 10 10')
      .attr('refX', 20).attr('refY', 0)
      .attr('markerWidth', 6).attr('markerHeight', 6)
      .attr('orient', 'auto')
      .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', '#444');

    // Build graph data
    var nodes = [];
    var links = [];
    var nodeMap = {};
    var idCounter = 0;

    function addNode(name, type, taskData, parentId) {
      var n = { id: ++idCounter, name: name, type: type, task: taskData || null };
      nodes.push(n);
      nodeMap[name + '_' + type] = n.id;
      if (parentId) links.push({ source: parentId, target: n.id });
      return n.id;
    }

    // Root
    var rootId = addNode('📋 任务总览 (' + data.length + '项)', 'root', null, null);

    // Build category → group → task hierarchy
    var cats = {};
    for (var i = 0; i < data.length; i++) {
      var t = data[i];
      var cat = t.c || '其他';
      if (!cats[cat]) cats[cat] = {};
      var gname = t.g || '未分组';
      if (!cats[cat][gname]) cats[cat][gname] = [];
      cats[cat][gname].push(t);
    }

    var catOrder = Object.keys(cats).sort();
    for (var ci = 0; ci < catOrder.length; ci++) {
      var catName = catOrder[ci];
      var catId = addNode(catName, 'category', null, rootId);
      var groups = cats[catName];
      var gnames = Object.keys(groups).sort();
      for (var gi = 0; gi < gnames.length; gi++) {
        var grpName = gnames[gi];
        var grpId = addNode(grpName, 'group', null, catId);
        var tasks = groups[grpName];
        tasks.sort(function(a,b){return (a.s==='已完成'?1:0)-(b.s==='已完成'?1:0);});
        for (var ti = 0; ti < tasks.length; ti++) {
          var t = tasks[ti];
          var sIcon = t.s === '已完成' ? '✅' : (t.s === '进行中' ? '⏳' : (t.s === '等待' ? '⏸️' : '📋'));
          var pIcon = t.p === '紧急' ? '🔴' : (t.p === '高' ? '🔼' : (t.p === '低' ? '🔽' : '➖'));
          var label = sIcon + ' ' + pIcon + ' ' + t.t;
          if (label.length > 30) label = label.substring(0, 28) + '..';
          addNode(label, 'task', t, grpId);
        }
      }
    }

    // Force simulation
    var simulation = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(function(d) { return d.id; }).distance(function(d) {
        if (d.target.type === 'task') return 100;
        if (d.target.type === 'group') return 130;
        return 160;
      }).strength(0.4))
      .force('charge', d3.forceManyBody().strength(function(d) {
        if (d.type === 'root') return -800;
        if (d.type === 'category') return -500;
        if (d.type === 'group') return -300;
        return -100;
      }))
      .force('center', d3.forceCenter(cx, cy))
      .force('collision', d3.forceCollide().radius(function(d) {
        if (d.type === 'task') return 35;
        if (d.type === 'group') return 45;
        if (d.type === 'category') return 60;
        return 50;
      }));

    // Draw links
    var link = containerG.append('g').selectAll('line')
      .data(links).enter().append('line')
      .attr('stroke', '#333').attr('stroke-width', 1.5)
      .attr('stroke-opacity', 0.5);

    // Draw nodes
    var node = containerG.append('g').selectAll('g')
      .data(nodes).enter().append('g')
      .attr('cursor', 'pointer')
      .call(d3.drag()
        .on('start', function(event, d) {
          if (!event.active) simulation.alphaTarget(0.3).restart();
          d.fx = d.x;
          d.fy = d.y;
        })
        .on('drag', function(event, d) {
          d.fx = event.x;
          d.fy = event.y;
        })
        .on('end', function(event, d) {
          if (!event.active) simulation.alphaTarget(0);
          // Optionally pin the node where dropped
          // d.fx = d.x; d.fy = d.y; // Uncomment to keep nodes in place after drag
          d.fx = null; d.fy = null; // Let physics settle
        })
      );

    // Root node: larger circle
    node.filter(function(d) { return d.type === 'root'; })
      .append('circle').attr('r', 28)
      .attr('fill', 'url(#rootGrad)')
      .attr('stroke', '#6c8cff').attr('stroke-width', 3);
    
    // Category nodes: medium circles
    node.filter(function(d) { return d.type === 'category'; })
      .append('circle').attr('r', 20)
      .attr('fill', '#2a3a5a').attr('stroke', '#6c8cff').attr('stroke-width', 2);

    // Group nodes: smaller circles
    node.filter(function(d) { return d.type === 'group'; })
      .append('circle').attr('r', 12)
      .attr('fill', '#1f2937').attr('stroke', '#4a5568').attr('stroke-width', 1.5);

    // Task nodes: rounded rects
    var taskG = node.filter(function(d) { return d.type === 'task'; });
    taskG.append('rect')
      .attr('width', function(d) { return Math.max((d.name.length || 10) * 7 + 16, 60); })
      .attr('height', 24)
      .attr('x', function(d) { return -Math.max((d.name.length || 10) * 7 + 16, 60) / 2; })
      .attr('y', -12)
      .attr('rx', 12).attr('ry', 12)
      .attr('fill', function(d) {
        if (!d.task) return '#1a1d28';
        if (d.task.s === '已完成') return '#0d2818';
        if (d.task.s === '进行中') return '#0d2828';
        if (d.task.p === '紧急') return '#2d1010';
        return '#1a1d28';
      })
      .attr('stroke', function(d) {
        if (!d.task) return '#3a3f55';
        if (d.task.s === '已完成') return '#2ed573';
        if (d.task.s === '进行中') return '#2ed573';
        if (d.task.p === '紧急') return '#ff4d6a';
        if (d.task.p === '高') return '#ff9f43';
        return '#3a3f55';
      })
      .attr('stroke-width', 1.5)
      .attr('stroke-dasharray', function(d) {
        return d.task && d.task.s === '等待' ? '4,2' : '0';
      });

    taskG.append('text')
      .attr('dy', 4)
      .attr('text-anchor', 'middle')
      .attr('fill', function(d) {
        return d.task && d.task.s === '已完成' ? '#778ca3' : '#e8eaf0';
      })
      .attr('font-size', '10px')
      .attr('font-weight', '600')
      .text(function(d) { return d.name; });

    // Labels for non-task nodes
    node.filter(function(d) { return d.type !== 'task'; })
      .append('text')
      .attr('dy', function(d) {
        return d.type === 'root' ? '36' : (d.type === 'category' ? '32' : '24');
      })
      .attr('text-anchor', 'middle')
      .attr('fill', function(d) {
        if (d.type === 'root') return '#6c8cff';
        if (d.type === 'category') return '#a0b4e8';
        return '#9ca3b8';
      })
      .attr('font-size', function(d) {
        return d.type === 'root' ? '14px' : (d.type === 'category' ? '12px' : '10px');
      })
      .attr('font-weight', function(d) {
        return d.type === 'root' ? '800' : (d.type === 'category' ? '700' : '500');
      })
      .text(function(d) { return d.name; });

    // Click to edit task
    taskG.on('click', function(event, d) {
      event.stopPropagation();
      if (d.task && d.task.id) openTreeEdit(d.task.id);
    });

    // Hover effect on tasks
    taskG.on('mouseenter', function() {
      d3.select(this).select('rect').attr('stroke-width', 2.5);
    }).on('mouseleave', function() {
      d3.select(this).select('rect').attr('stroke-width', 1.5);
    });

    // Tick: update positions
    simulation.on('tick', function() {
      link.attr('x1', function(d) { return d.source.x; })
        .attr('y1', function(d) { return d.source.y; })
        .attr('x2', function(d) { return d.target.x; })
        .attr('y2', function(d) { return d.target.y; });
      node.attr('transform', function(d) { return 'translate(' + d.x + ',' + d.y + ')'; });
    });

    // Gradient for root
    svg.select('defs').append('radialGradient').attr('id', 'rootGrad')
      .append('stop').attr('offset', '0%').attr('stop-color', '#4a6cdf');
    svg.select('#rootGrad').append('stop').attr('offset', '100%').attr('stop-color', '#6c8cff');

    // Legend
    var legend = svg.append('g').attr('transform', 'translate(10, 14)');
    legend.append('text').attr('fill', '#555').attr('font-size', '10px')
      .text('🖱️拖拽节点  👆点击任务  🔍滚轮缩放');
  });
}

// Tree Edit Modal (same as before)
function openTreeEdit(id) {

  for (var i = 0; i < merged.length; i++) {

  }
  if (!t) { treeEditId = null; return; }
  document.getElementById('treeEditTitle').textContent = '✏️ ' + t.t;

    if (TASKS[i].g) groups[TASKS[i].g] = 1;
  }
  var grpSel = document.getElementById('te-g');

  for (var gname in groups) {
    grpSel.innerHTML += '<option value="' + gname + '">' + gname + '</option>';
  }
  grpSel.value = t.g || '';
  document.getElementById('te-p').value = t.p || '中';
  document.getElementById('te-s').value = t.s || '待办';
  document.getElementById('treeEditMo').classList.add('show');
}

function closeTreeEdit() { document.getElementById('treeEditMo').classList.remove('show'); treeEditId = null; }

function treeEditSave() {
  if (!treeEditId) return;
  var changes = loadLocalChanges();
  var cid = String(treeEditId);
  if (!changes[cid]) changes[cid] = {};
  var g = document.getElementById('te-g').value;
  var p = document.getElementById('te-p').value;
  var s = document.getElementById('te-s').value;
  if (g !== '') changes[cid]._group = g;
  if (p) changes[cid]._priority = p;
  if (s) changes[cid].s = s;
  if (s === '已完成') changes[cid].pg = 100;
  saveLocalChanges(changes);
  closeTreeEdit();
  updateSyncUI();
  doRender();
  showToast('已更新 ✅');
}

function submitAddTask() {
  var title = document.getElementById("at-title").value.trim();
  if (!title) { showToast("请输入任务标题"); return; }

  var newTasks = loadNewTasks();
  var newId = -1;
  for (var ni = 0; ni < newTasks.length; ni++) {
    if (newTasks[ni].id <= newId) newId = newTasks[ni].id - 1;
  }
  for (var i = 0; i < TASKS.length; i++) {

  }

  var task = {
    id: newId,
    t: title,
    c: document.getElementById("at-c").value || "其他",
    p: document.getElementById("at-p").value || "中",
    s: document.getElementById("at-s").value || "待办",
    d: document.getElementById("at-d").value || "",
    ds: document.getElementById("at-ds").value.trim() || "",
    pg: 0,
    g: document.getElementById("at-g").value || "",
    st: [],
    updates: []
  };
  newTasks.push(task);
  saveNewTasks(newTasks);
  closeAddMo();
  updateSyncUI();
  doRender();
  showToast("已新建: " + title);
}

// Delete a task
function deleteTask(id) {
  var merged = getMergedTasks();
  var t = null;
  for (var i = 0; i < merged.length; i++) {
    if (merged[i].id === id) { t = merged[i]; break; }
  }
  if (!t) return;
  if (!confirm("确定删除「" + t.t + "」？")) return;

  var changes = loadLocalChanges();
  var cid = String(id);
  if (!changes[cid]) changes[cid] = {};
  changes[cid]._deleted = true;
  saveLocalChanges(changes);
  doRender();
  updateSyncUI();
  showToast("已删除: " + t.t);
}

// Toggle subtask: 待办 → 进行中 → 已完成 → 待办
function toggleSubtask(taskId, stIdx) {
  var changes = loadLocalChanges();
  var cid = String(taskId);
  if (!changes[cid]) changes[cid] = {};

  var origSt = null;
  for (var i = 0; i < TASKS.length; i++) {
    if (TASKS[i].id === taskId && TASKS[i].st) {
      origSt = JSON.parse(JSON.stringify(TASKS[i].st));
      break;
    }
  }
  if (!origSt) return;

  var curSt = JSON.parse(JSON.stringify(origSt));
  if (changes[cid].st) {
    for (var si = 0; si < changes[cid].st.length; si++) {
      var cst = changes[cid].st[si];
      for (var oi = 0; oi < curSt.length; oi++) {
        if (curSt[oi].t === cst.t) curSt[oi].s = cst.s;
      }
    }
  }

  var states = ["待办", "进行中", "已完成"];
  var curState = curSt[stIdx].s;
  var nextIdx = (states.indexOf(curState) + 1) % 3;
  curSt[stIdx].s = states[nextIdx];

  changes[cid].st = curSt;
  saveLocalChanges(changes);
  updateSyncUI();
  doRender();
  showToast(curSt[stIdx].t + " → " + states[nextIdx]);
}

// Override updateSyncUI to account for new tasks
updateSyncUI = (function(orig) {
  return function() {
    var changes = loadLocalChanges();
    var newTasks = loadNewTasks();
    var count = Object.keys(changes).length + newTasks.length;
    var btn = document.getElementById("syncBtn");
    var cntEl = document.getElementById("syncCount");
    var clrBtn = document.getElementById("clearBtn");
    if (count > 0) {
      cntEl.textContent = "(" + count + ")";
      btn.classList.add("has-changes");
      clrBtn.style.display = "inline-flex";
    } else {
      cntEl.textContent = "";
      btn.classList.remove("has-changes");
      clrBtn.style.display = "none";
    }
  };
})();

// Override clearLocalChanges
clearLocalChanges = (function(orig) {
  return function() {
    var changes = loadLocalChanges();
    var newTasks = loadNewTasks();
    var hasChanges = Object.keys(changes).length > 0 || newTasks.length > 0;
    if (!hasChanges) { showToast("没有待清除的本地变更"); return; }
    if (confirm("确定清除所有本地变更？")) {
      saveLocalChanges({});
      saveNewTasks([]);
      updateSyncUI();
      doRender();
      showToast("本地变更已清除");
    }
  };
})();
// ===== END NEW FUNCTIONS =====

fetchData(function() {
  updateSyncUI();
  doRender();

  // Notification permission check
  if ("Notification" in window && Notification.permission === "granted") {
    updateNotifBadge(true);
    checkTodayTasks();
  }
});

// Manual refresh only — no auto-fetch
var lastFetchTime = Date.now();
setInterval(function() {
  var secs = Math.round((Date.now() - lastFetchTime) / 1000);
  var btn = document.getElementById("refreshTimer");
  if (btn) btn.textContent = secs + "s";
  var ageEl = document.getElementById("dataAge");
  if (ageEl) {
    if (secs < 60) ageEl.textContent = "· " + secs + "秒前更新";
    else ageEl.textContent = "· " + Math.round(secs/60) + "分钟前更新";
  }
}, 1000);

// Override fetchData to track time
var _origFetchCb = null;
</script>
</body>
